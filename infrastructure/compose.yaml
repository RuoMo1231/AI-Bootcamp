services:
  mysql:
    image: mysql:8.4
    container_name: docker_mysql1

    ports:
      - 33059:3306

    env_file:
      - path: ./.env
        required: true

    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:8

    container_name: docker_redis1

    ports:
      - 63790:6379

    volumes:
      - ./redis/data:/data
      - ./redis/redis.conf:/usr/local/etc/redis.conf

    command:
      - redis-server
      - /usr/local/etc/redis.conf

volumes:
  mysql_data: